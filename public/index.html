<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PiCar Eye</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 24px;
    }

    #preview {
      width: 100%;
      max-width: 400px;
      aspect-ratio: 4/3;
      background: #0f0f1a;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #333;
    }

    #preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #preview .placeholder {
      color: #444;
      font-size: 0.9rem;
    }

    .buttons {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 400px;
    }

    button, label {
      flex: 1;
      padding: 16px 24px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      text-align: center;
    }

    .capture {
      background: linear-gradient(135deg, #e94560 0%, #c73659 100%);
      color: white;
    }

    .gallery {
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      color: white;
      border: 2px solid #0f3460;
    }

    button:active, label:active {
      transform: scale(0.96);
    }

    #fileInput, #cameraInput {
      display: none;
    }

    #status {
      margin-top: 20px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      font-size: 0.85rem;
      text-align: center;
      max-width: 400px;
    }

    .success { color: #4ade80; }
    .error { color: #f87171; }
    .sending { color: #facc15; }
  </style>
</head>
<body>
  <h1>PiCar Eye</h1>
  <p class="subtitle">Send photos to Orion & Caelum</p>

  <div id="preview">
    <span class="placeholder">No photo yet</span>
  </div>

  <div class="buttons">
    <label class="capture" for="cameraInput">📷 Capture</label>
    <label class="gallery" for="fileInput">🖼️ Gallery</label>
  </div>

  <input type="file" id="cameraInput" accept="image/*" capture="environment">
  <input type="file" id="fileInput" accept="image/*">

  <div id="status"></div>

  <script>
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');
    const cameraInput = document.getElementById('cameraInput');
    const fileInput = document.getElementById('fileInput');

    function handleFile(file) {
      if (!file) return;

      // Show preview
      const reader = new FileReader();
      reader.onload = (e) => {
        preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
      };
      reader.readAsDataURL(file);

      // Upload
      upload(file);
    }

    async function upload(file) {
      status.textContent = 'Sending to Orion & Caelum...';
      status.className = 'sending';

      const formData = new FormData();
      formData.append('photo', file);

      try {
        const res = await fetch('/upload', {
          method: 'POST',
          body: formData
        });

        if (res.ok) {
          status.textContent = '✓ Photo sent! They can see it now.';
          status.className = 'success';
        } else {
          throw new Error('Upload failed');
        }
      } catch (err) {
        status.textContent = '✗ Failed to send. Try again?';
        status.className = 'error';
      }
    }

    cameraInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
  </script>
</body>
</html>
